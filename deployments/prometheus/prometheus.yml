global:
  scrape_interval: 5s

scrape_configs:
  - job_name: backend-api
    static_configs:
      - targets: ["backend-api:8000"]
  - job_name: stream-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["stream-gateway:8010"]
  - job_name: inference-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["inference-worker:8020"]
  - job_name: event-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["event-engine:8030"]
  - job_name: scheduler
    metrics_path: /metrics
    static_configs:
      - targets: ["scheduler:8040"]

